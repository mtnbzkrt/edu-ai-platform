<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎓 Eğitim AI Platform</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0f1729;color:#e2e8f0;min-height:100vh;display:flex;flex-direction:column}
a{color:#63b3ed;text-decoration:none}

/* LOGIN */
.login-page{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#0f1729 0%,#1a2744 100%)}
.login-box{background:#1e293b;border-radius:16px;padding:40px;width:90%;max-width:420px;border:1px solid #334155}
.login-box h1{font-size:1.6rem;text-align:center;margin-bottom:8px;color:#63b3ed}
.login-box p{text-align:center;color:#94a3b8;font-size:.85rem;margin-bottom:24px}
.login-box input{width:100%;padding:12px 16px;background:#0f172a;border:1px solid #334155;border-radius:8px;color:#e2e8f0;font-size:.95rem;margin-bottom:12px;outline:none}
.login-box input:focus{border-color:#3b82f6}
.login-box button{width:100%;padding:12px;background:#3b82f6;color:#fff;border:none;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer;transition:.2s}
.login-box button:hover{background:#2563eb}
.login-error{color:#f87171;font-size:.85rem;text-align:center;margin-top:8px;display:none}
.demo-accounts{margin-top:20px;padding-top:16px;border-top:1px solid #334155}
.demo-accounts h3{font-size:.8rem;color:#64748b;text-transform:uppercase;margin-bottom:8px;letter-spacing:.05em}
.demo-btn{display:block;width:100%;padding:8px 12px;margin-bottom:6px;background:#1e293b;border:1px solid #334155;border-radius:6px;color:#94a3b8;cursor:pointer;font-size:.82rem;text-align:left;transition:.15s}
.demo-btn:hover{background:#334155;color:#e2e8f0;border-color:#475569}
.demo-btn .role-tag{float:right;padding:1px 8px;border-radius:10px;font-size:.72rem;font-weight:600}
.role-student{background:rgba(52,211,153,.15);color:#34d399}
.role-teacher{background:rgba(96,165,250,.15);color:#60a5fa}
.role-parent{background:rgba(251,191,36,.15);color:#fbbf24}

/* APP LAYOUT */
.app{display:none;flex-direction:column;height:100vh;overflow:hidden}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:#1e293b;border-bottom:1px solid #334155}
.topbar .brand{display:flex;align-items:center;gap:10px}
.topbar .brand h2{font-size:1.1rem;color:#63b3ed}
.topbar .user-info{display:flex;align-items:center;gap:12px}
.topbar .user-badge{padding:4px 12px;border-radius:20px;font-size:.78rem;font-weight:600}
.topbar .logout-btn{padding:6px 14px;background:#ef4444;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:.8rem}

.main-content{display:flex;flex:1;overflow:hidden;min-height:0}
.sidebar{width:260px;background:#1a2332;border-right:1px solid #334155;display:flex;flex-direction:column;overflow-y:auto}
.sidebar h3{padding:16px 16px 8px;font-size:.75rem;text-transform:uppercase;color:#64748b;letter-spacing:.05em}
.session-list{flex:1;overflow-y:auto;padding:0 8px}
.session-item{padding:10px 12px;margin:2px 0;border-radius:8px;cursor:pointer;font-size:.85rem;transition:.15s;display:flex;justify-content:space-between;align-items:center}
.session-item:hover{background:#334155}
.session-item.active{background:#334155;border-left:3px solid #3b82f6}
.session-item .time{font-size:.7rem;color:#64748b}
.new-session-btn{margin:12px;padding:10px;background:#3b82f6;color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:600;font-size:.85rem}
.new-session-btn:hover{background:#2563eb}

.chat-area{flex:1;display:flex;flex-direction:column;background:#0f172a;overflow:hidden;min-height:0}
.chat-header{padding:12px 20px;background:#1e293b;border-bottom:1px solid #334155;font-size:.9rem;color:#94a3b8}
.chat-view{display:none;flex-direction:column;flex:1;overflow:hidden;min-height:0}
.chat-view.visible{display:flex}
.messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px;min-height:0;max-height:100%}
.msg{max-width:80%;padding:12px 16px;border-radius:12px;font-size:.9rem;line-height:1.5;white-space:pre-wrap;word-wrap:break-word}
.msg.user{align-self:flex-end;background:#3b82f6;color:#fff;border-bottom-right-radius:4px}
.msg.assistant{align-self:flex-start;background:#1e293b;color:#e2e8f0;border-bottom-left-radius:4px;border:1px solid #334155}
.msg.assistant strong{color:#63b3ed}
.msg .tools-used{margin-top:8px;padding-top:6px;border-top:1px solid #334155;font-size:.72rem;color:#64748b}
.msg .tools-used span{display:inline-block;padding:1px 6px;margin:2px;background:#0f172a;border-radius:4px;font-family:monospace}

.chat-input{display:flex;gap:8px;padding:16px 20px;background:#1e293b;border-top:1px solid #334155}
.chat-input input{flex:1;padding:12px 16px;background:#0f172a;border:1px solid #334155;border-radius:8px;color:#e2e8f0;font-size:.95rem;outline:none}
.chat-input input:focus{border-color:#3b82f6}
.chat-input button{padding:12px 24px;background:#3b82f6;color:#fff;border:none;border-radius:8px;font-weight:600;cursor:pointer;font-size:.9rem}
.chat-input button:hover{background:#2563eb}
.chat-input button:disabled{opacity:.5;cursor:not-allowed}

.typing{align-self:flex-start;color:#64748b;font-size:.85rem;font-style:italic;padding:8px 16px}

.welcome-screen{flex:1;display:flex;align-items:center;justify-content:center;text-align:center;padding:40px}
.welcome-screen h2{font-size:1.4rem;color:#63b3ed;margin-bottom:8px}
.welcome-screen p{color:#94a3b8;font-size:.9rem;max-width:400px}

.quick-actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:20px;justify-content:center}
.quick-btn{padding:8px 16px;background:#1e293b;border:1px solid #334155;border-radius:20px;color:#94a3b8;cursor:pointer;font-size:.82rem;transition:.15s}
.quick-btn:hover{background:#334155;color:#e2e8f0;border-color:#3b82f6}

@media(max-width:768px){
  .sidebar{display:none}
  .msg{max-width:95%}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-page" id="loginPage">
  <div class="login-box">
    <h1>🎓 Eğitim AI</h1>
    <p>Akıllı Eğitim Platformuna Hoş Geldiniz</p>
    <input type="text" id="username" placeholder="Kullanıcı adı" autocomplete="username">
    <input type="password" id="password" placeholder="Şifre" autocomplete="current-password">
    <button onclick="login()">Giriş Yap</button>
    <div class="login-error" id="loginError"></div>
    <div class="demo-accounts">
      <h3>Demo Hesaplar</h3>
      <button class="demo-btn" onclick="quickLogin('ahmet','123456')">
        🎓 Ahmet Yılmaz (7/A Öğrenci) <span class="role-tag role-student">Öğrenci</span>
      </button>
      <button class="demo-btn" onclick="quickLogin('zeynep','123456')">
        🎓 Zeynep Demir (7/A Öğrenci) <span class="role-tag role-student">Öğrenci</span>
      </button>
      <button class="demo-btn" onclick="quickLogin('ayse.ogretmen','123456')">
        👩‍🏫 Ayşe Kaya (Matematik) <span class="role-tag role-teacher">Öğretmen</span>
      </button>
      <button class="demo-btn" onclick="quickLogin('veli.yilmaz','123456')">
        👨 Mehmet Yılmaz (Ahmet'in babası) <span class="role-tag role-parent">Veli</span>
      </button>
      <button class="demo-btn" onclick="quickLogin('veli.demir','123456')">
        👩 Fatma Demir (Zeynep'in annesi) <span class="role-tag role-parent">Veli</span>
      </button>
    </div>
  </div>
</div>

<!-- APP -->
<div class="app" id="appPage">
  <div class="topbar">
    <div class="brand">
      <h2>🎓 Eğitim AI</h2>
    </div>
    <div class="user-info">
      <span id="userFullName"></span>
      <span class="user-badge" id="userRoleBadge"></span>
      <button class="logout-btn" onclick="logout()">Çıkış</button>
    </div>
  </div>
  <div class="main-content">
    <div class="sidebar">
      <button class="new-session-btn" onclick="newSession()">+ Yeni Konuşma</button>
      <h3>Konuşmalar</h3>
      <div class="session-list" id="sessionList"></div>
    </div>
    <div class="chat-area" id="chatArea">
      <div class="welcome-screen" id="welcomeScreen">
        <div>
          <h2 id="welcomeTitle">Hoş Geldiniz!</h2>
          <p id="welcomeText">Yeni bir konuşma başlatarak eğitim asistanınızla sohbet edebilirsiniz.</p>
          <div class="quick-actions" id="quickActions"></div>
        </div>
      </div>
      <div id="chatView" class="chat-view">
        <div class="chat-header" id="chatHeader"></div>
        <div class="messages" id="messages"></div>
        <div class="chat-input">
          <input type="text" id="chatInput" placeholder="Mesajınızı yazın..." onkeydown="if(event.key==='Enter')sendMessage()">
          <button id="sendBtn" onclick="sendMessage()">Gönder</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const API = window.location.origin;
let state = { token: null, user: null, sessions: [], currentSession: null, agentKey: null };

// ── AUTH ──
async function login() {
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;
  const errEl = document.getElementById("loginError");
  errEl.style.display = "none";

  try {
    const r = await fetch(API + "/api/auth/login", {
      method: "POST", headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ username, password })
    });
    const d = await r.json();
    if (!d.ok) { errEl.textContent = d.error.message; errEl.style.display = "block"; return; }

    state.token = d.data.token;
    state.user = d.data.user;
    state.agentKey = d.data.agent_key;
    localStorage.setItem("edu_token", state.token);
    localStorage.setItem("edu_user", JSON.stringify(state.user));
    localStorage.setItem("edu_agent", state.agentKey);
    showApp();
  } catch(e) { errEl.textContent = "Bağlantı hatası"; errEl.style.display = "block"; }
}

function quickLogin(u, p) {
  document.getElementById("username").value = u;
  document.getElementById("password").value = p;
  login();
}

function logout() {
  localStorage.clear();
  state = { token: null, user: null, sessions: [], currentSession: null };
  document.getElementById("loginPage").style.display = "flex";
  document.getElementById("appPage").style.display = "none";
}

// ── APP ──
function showApp() {
  document.getElementById("loginPage").style.display = "none";
  document.getElementById("appPage").style.display = "flex";

  const roleLabels = { student:"Öğrenci", teacher:"Öğretmen", parent:"Veli", admin:"Yönetici" };
  const roleColors = { student:"role-student", teacher:"role-teacher", parent:"role-parent" };
  document.getElementById("userFullName").textContent = state.user.full_name;
  const badge = document.getElementById("userRoleBadge");
  badge.textContent = roleLabels[state.user.role] || state.user.role;
  badge.className = "user-badge " + (roleColors[state.user.role] || "");

  setupWelcome();
  loadSessions();
}

function setupWelcome() {
  const qa = document.getElementById("quickActions");
  const actions = {
    student: [
      ["📊 Sınav sonuçlarım","Sınav sonuçlarımı göster"],
      ["📝 Ödevlerim","Bekleyen ödevlerim ne?"],
      ["🔍 Eksik konularım","Hangi konularda eksik var?"],
      ["📅 Çalışma planı","Bana çalışma planı yap"]
    ],
    teacher: [
      ["📚 Sınıflarım","Sınıflarımı göster"],
      ["📊 Sınıf analizi","Sınıf başarı analizi yap"],
      ["🚨 Risk analizi","Riskli öğrenciler kimler?"],
      ["👥 Öğrenci listesi","Öğrencileri listele"]
    ],
    parent: [
      ["📊 Durum raporu","Çocuğum nasıl gidiyor?"],
      ["📝 Ödevler","Ödevlerini yapıyor mu?"],
      ["📅 Devamsızlık","Devamsızlık durumu ne?"],
      ["📈 Sınavlar","Sınav sonuçları nasıl?"]
    ]
  };

  qa.innerHTML = (actions[state.user.role] || []).map(([label, msg]) =>
    `<button class="quick-btn" onclick="quickChat('${msg}')">${label}</button>`
  ).join("");
}

// ── SESSIONS ──
async function apiFetch(url, opts = {}) {
  return fetch(API + url, {
    ...opts,
    headers: { "Content-Type":"application/json", "Authorization":"Bearer " + state.token, ...(opts.headers||{}) }
  }).then(r => r.json());
}

async function loadSessions() {
  const d = await apiFetch("/api/ai/sessions");
  if (d.ok) {
    state.sessions = d.data;
    renderSessions();
  }
}

function renderSessions() {
  const el = document.getElementById("sessionList");
  el.innerHTML = state.sessions.map(s => {
    const active = state.currentSession === s.id ? " active" : "";
    const time = new Date(s.updated_at || s.created_at).toLocaleTimeString("tr-TR", { hour:"2-digit", minute:"2-digit" });
    return `<div class="session-item${active}" onclick="openSession('${s.id}')">
      <span>${s.title || "Konuşma"}</span>
      <span class="time">${time}</span>
    </div>`;
  }).join("");
}

async function newSession() {
  const d = await apiFetch("/api/ai/sessions", { method: "POST", body: JSON.stringify({ agent_key: state.agentKey }) });
  if (d.ok) {
    await loadSessions();
    openSession(d.data.session_id);
  }
}

async function openSession(sessionId) {
  state.currentSession = sessionId;
  renderSessions();

  document.getElementById("welcomeScreen").style.display = "none";
  const cv = document.getElementById("chatView");
  cv.classList.add("visible");

  const d = await apiFetch("/api/ai/sessions/" + sessionId);
  if (!d.ok) return;

  const agentLabels = { "learner-agent":"🎓 Öğrenme Asistanı", "teacher-agent":"👩‍🏫 Öğretmen Asistanı", "parent-agent":"👨‍👩‍👧 Veli Asistanı" };
  document.getElementById("chatHeader").textContent = agentLabels[d.data.agent_key] || d.data.agent_key;

  const msgEl = document.getElementById("messages");
  msgEl.innerHTML = d.data.messages.map(m => renderMessage(m)).join("");
  msgEl.scrollTop = msgEl.scrollHeight;

  document.getElementById("chatInput").focus();
}

function renderMessage(m) {
  let html = `<div class="msg ${m.role}">${formatText(m.content)}`;
  if (m.role === "assistant" && m.used_tools) {
    try {
      const tools = JSON.parse(m.used_tools);
      if (tools.length > 0) {
        html += `<div class="tools-used">🔧 ${tools.map(t=>`<span>${t}</span>`).join(" ")}</div>`;
      }
    } catch(e) {}
  }
  html += "</div>";
  return html;
}

function formatText(text) {
  return text
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/\*\*(.*?)\*\*/g,"<strong>$1</strong>")
    .replace(/\n/g,"<br>");
}

// ── CHAT ──
async function sendMessage() {
  const input = document.getElementById("chatInput");
  const msg = input.value.trim();
  if (!msg) return;

  if (!state.currentSession) {
    await newSession();
    // Small delay for session creation
    await new Promise(r => setTimeout(r, 200));
  }

  input.value = "";
  const msgEl = document.getElementById("messages");
  msgEl.innerHTML += `<div class="msg user">${formatText(msg)}</div>`;
  msgEl.innerHTML += `<div class="typing" id="typingIndicator">🤔 Düşünüyor...</div>`;
  msgEl.scrollTop = msgEl.scrollHeight;

  document.getElementById("sendBtn").disabled = true;

  try {
    const d = await apiFetch("/api/ai/chat", {
      method: "POST",
      body: JSON.stringify({ session_id: state.currentSession, message: msg })
    });

    const typing = document.getElementById("typingIndicator");
    if (typing) typing.remove();

    if (d.ok) {
      msgEl.innerHTML += renderMessage({ role:"assistant", content: d.data.assistant_message, used_tools: JSON.stringify(d.data.used_tools) });
    } else {
      msgEl.innerHTML += `<div class="msg assistant" style="border-color:#ef4444">❌ ${d.error?.message || "Bir hata oluştu"}</div>`;
    }
  } catch(e) {
    const typing = document.getElementById("typingIndicator");
    if (typing) typing.remove();
    msgEl.innerHTML += `<div class="msg assistant" style="border-color:#ef4444">❌ Bağlantı hatası</div>`;
  }

  document.getElementById("sendBtn").disabled = false;
  msgEl.scrollTop = msgEl.scrollHeight;
  loadSessions(); // Refresh sidebar
}

function quickChat(msg) {
  document.getElementById("chatInput").value = msg;
  sendMessage();
}

// ── INIT ──
(function init() {
  const token = localStorage.getItem("edu_token");
  const user = localStorage.getItem("edu_user");
  const agent = localStorage.getItem("edu_agent");
  if (token && user) {
    state.token = token;
    state.user = JSON.parse(user);
    state.agentKey = agent;
    showApp();
  }
})();
</script>
</body>
</html>
