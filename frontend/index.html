<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Eğitim AI Platformu</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f8fafc;--card:#fff;--border:#e2e8f0;--text:#1e293b;--text2:#64748b;--primary:#3b82f6;--primary-hover:#2563eb;--green:#22c55e;--red:#ef4444;--yellow:#f59e0b;--sidebar-bg:#1e293b;--sidebar-text:#e2e8f0;--safe-bottom:env(safe-area-inset-bottom,0px)}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);height:100dvh;overflow:hidden}

/* Login */
.login{display:flex;align-items:center;justify-content:center;height:100dvh;background:linear-gradient(135deg,#667eea,#764ba2);padding:16px}
.login-card{background:#fff;padding:32px;border-radius:16px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.login-card h1{font-size:22px;margin-bottom:4px}
.login-card p{color:var(--text2);margin-bottom:20px;font-size:14px}
.login-card input{width:100%;padding:12px;border:1px solid var(--border);border-radius:8px;font-size:16px;margin-bottom:10px;outline:none;-webkit-appearance:none}
.login-card input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(59,130,246,.1)}
.login-card button.login-btn{width:100%;padding:12px;background:var(--primary);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer}
.login-card .error{color:var(--red);font-size:13px;margin-top:8px}
.quick-logins{margin-top:16px;padding-top:16px;border-top:1px solid var(--border)}
.quick-logins p{font-size:12px;color:#94a3b8;margin-bottom:8px}
.quick-logins .quick-row{display:flex;flex-wrap:wrap;gap:6px}
.quick-btn{padding:6px 12px;background:#f1f5f9;border:1px solid var(--border);border-radius:6px;font-size:12px;cursor:pointer;color:#475569}
.quick-btn:hover{background:#e2e8f0}

/* App layout */
.app{display:none;flex-direction:column;height:100dvh;overflow:hidden}

/* Header - mobile friendly */
.header{display:flex;align-items:center;padding:10px 16px;background:#fff;border-bottom:1px solid var(--border);flex-shrink:0;gap:8px;min-height:52px}
.header .menu-btn{display:none;background:none;border:none;font-size:20px;cursor:pointer;padding:4px}
.header .user-section{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.header .user-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.role-badge{padding:3px 8px;border-radius:10px;font-size:11px;font-weight:600;color:#fff;white-space:nowrap}
.role-student{background:var(--green)}
.role-teacher{background:var(--primary)}
.role-parent{background:var(--yellow);color:#1e293b}
.header .logout-btn{padding:6px 12px;border:1px solid var(--border);border-radius:6px;background:#fff;cursor:pointer;font-size:12px;white-space:nowrap;flex-shrink:0}

/* Main content */
.main-content{display:flex;flex:1;overflow:hidden;min-height:0;position:relative}

/* Sidebar */
.sidebar{width:280px;background:var(--sidebar-bg);color:var(--sidebar-text);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.sidebar h3{padding:14px 16px 6px;font-size:12px;text-transform:uppercase;color:#94a3b8;letter-spacing:.5px}
.sidebar .new-session{margin:8px 12px;padding:10px;background:rgba(255,255,255,.1);border:1px dashed rgba(255,255,255,.2);border-radius:8px;color:#e2e8f0;cursor:pointer;text-align:center;font-size:13px}
.sessions-list{flex:1;overflow-y:auto;padding:4px 8px}
.session-item{padding:10px 12px;border-radius:8px;cursor:pointer;margin-bottom:4px;font-size:13px;color:#cbd5e1}
.session-item:hover{background:rgba(255,255,255,.08)}
.session-item.active{background:rgba(59,130,246,.3);color:#fff}
.session-item .agent-tag{font-size:11px;color:#94a3b8}

/* Overlay for mobile sidebar */
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99}

/* Chat area */
.chat-area{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}

/* Welcome */
.welcome-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 16px;text-align:center;overflow-y:auto}
.welcome-screen h2{font-size:24px;margin-bottom:8px}
.welcome-screen>p{color:var(--text2);max-width:400px;line-height:1.6;font-size:14px}
.tools-grid{display:grid;grid-template-columns:1fr;gap:10px;margin-top:20px;width:100%;max-width:400px}
.tool-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;cursor:pointer}
.tool-card:hover{border-color:var(--primary)}
.tool-card h4{font-size:13px;margin-bottom:2px}
.tool-card p{font-size:12px;color:var(--text2);margin:0}

/* Chat view */
.chat-view{display:none;flex-direction:column;flex:1;overflow:hidden;min-height:0}
.chat-view.visible{display:flex}
.messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;min-height:0}
.msg{max-width:90%;padding:10px 14px;border-radius:14px;font-size:14px;line-height:1.6;word-wrap:break-word}
.msg.user{align-self:flex-end;background:var(--primary);color:#fff;border-bottom-right-radius:4px}
.msg.assistant{align-self:flex-start;background:#fff;border:1px solid var(--border);border-bottom-left-radius:4px}
.msg.assistant strong{color:var(--text)}
.msg.assistant pre{background:#f1f5f9;padding:8px;border-radius:6px;overflow-x:auto;font-size:12px;margin:6px 0}
.msg .tools-used{margin-top:6px;padding-top:6px;border-top:1px solid var(--border);font-size:11px;color:var(--text2)}
.msg .tools-used span{display:inline-block;background:#f0fdf4;color:#16a34a;padding:2px 6px;border-radius:4px;margin:2px;font-size:10px}
.typing{align-self:flex-start;padding:12px 16px;color:var(--text2);font-size:13px}
/* old typing */ .typing-text::after{content:'';animation:dots 1.5s infinite}
@keyframes dots{0%{content:''}33%{content:'.'}66%{content:'..'}100%{content:'...'}}

/* Chat input */
.chat-input{padding:12px 16px;padding-bottom:calc(12px + var(--safe-bottom));border-top:1px solid var(--border);background:#fff;display:flex;gap:8px;flex-shrink:0}
.chat-input input{flex:1;padding:10px 14px;border:1px solid var(--border);border-radius:22px;font-size:16px;outline:none;-webkit-appearance:none}
.chat-input input:focus{border-color:var(--primary)}
.chat-input button{width:44px;height:44px;background:var(--primary);color:#fff;border:none;border-radius:50%;font-size:18px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.chat-input button:disabled{opacity:.4;cursor:not-allowed}

/* New chat FAB */
.fab{display:none;position:fixed;bottom:calc(80px + var(--safe-bottom));right:16px;width:52px;height:52px;background:var(--primary);color:#fff;border:none;border-radius:50%;font-size:24px;box-shadow:0 4px 12px rgba(59,130,246,.4);cursor:pointer;z-index:50;align-items:center;justify-content:center}

/* Mobile */
@media(max-width:768px){
  .header .menu-btn{display:block}
  .sidebar{position:fixed;left:-280px;top:0;bottom:0;z-index:100;transition:left .25s ease}
  .sidebar.open{left:0}
  .sidebar-overlay.show{display:block}
  .tools-grid{grid-template-columns:1fr}
  .msg{max-width:92%}
  .fab{display:flex}
}

@media(min-width:769px){
  .tools-grid{grid-template-columns:repeat(2,1fr)}
}
.streaming-cursor::after{content:"▊";animation:blink 0.7s infinite;color:var(--primary)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login" id="loginScreen">
  <div class="login-card">
    <h1>🎓 Eğitim AI</h1>
    <p>Yapay zeka destekli eğitim platformu</p>
    <input id="loginUser" type="text" placeholder="Kullanıcı adı" autocomplete="username">
    <input id="loginPass" type="password" placeholder="Şifre" autocomplete="current-password">
    <button class="login-btn" onclick="login()">Giriş Yap</button>
    <div class="error" id="loginError"></div>
    <div class="quick-logins">
      <p>Hızlı giriş:</p>
      <div class="quick-row">
        <button class="quick-btn" onclick="quickLogin('ahmet','123456')">🎓 Ahmet</button>
        <button class="quick-btn" onclick="quickLogin('zeynep','123456')">🎓 Zeynep</button>
        <button class="quick-btn" onclick="quickLogin('ayse.ogretmen','123456')">👩‍🏫 Ayşe</button>
        <button class="quick-btn" onclick="quickLogin('veli.yilmaz','123456')">👨 Veli</button>
      </div>
    </div>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">
  <div class="header">
    <button class="menu-btn" onclick="toggleSidebar()">☰</button>
    <div class="user-section">
      <span class="user-name" id="userName"></span>
      <span class="role-badge" id="roleBadge"></span>
    </div>
    <button class="logout-btn" onclick="logout()">Çıkış</button>
  </div>

  <div class="main-content">
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
    <div class="sidebar" id="sidebar">
      <h3>💬 Konuşmalar</h3>
      <div class="new-session" onclick="newSession()">+ Yeni Konuşma</div>
      <div class="sessions-list" id="sessionsList"></div>
    </div>

    <div class="chat-area">
      <!-- Welcome -->
      <div class="welcome-screen" id="welcomeScreen">
        <h2>Hoş Geldiniz 👋</h2>
        <p>AI asistanınızla sohbet başlatın. Sınav sonuçlarınızı analiz edebilir, eksik konularınızı bulabilir ve çalışma planı hazırlayabilir.</p>
        <div class="tools-grid" id="toolsGrid"></div>
      </div>

      <!-- Chat -->
      <div class="chat-view" id="chatView">
        <div class="messages" id="messages"></div>
        <div class="chat-input">
          <input id="chatInput" type="text" placeholder="Mesajınızı yazın..." onkeydown="if(event.key==='Enter')sendMessage()">
          <button id="sendBtn" onclick="sendMessage()">➤</button>
        </div>
      </div>
    </div>
  </div>

  <button class="fab" id="fabBtn" onclick="newSession()">+</button>
</div>

<script>
let TOKEN=null, USER=null, CURRENT_SESSION=null;
const API=window.location.origin;

function quickLogin(u,p){document.getElementById("loginUser").value=u;document.getElementById("loginPass").value=p;login()}

async function login(){
  const username=document.getElementById("loginUser").value;
  const password=document.getElementById("loginPass").value;
  try{
    const r=await fetch(API+"/api/auth/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username,password})});
    const d=await r.json();
    if(!d.ok){document.getElementById("loginError").textContent=d.error?.message||"Hata";return}
    TOKEN=d.data.token;USER=d.data.user;
    document.getElementById("loginScreen").style.display="none";
    document.getElementById("app").style.display="flex";
    document.getElementById("userName").textContent=USER.full_name;
    const badge=document.getElementById("roleBadge");
    badge.textContent={student:"Öğrenci",teacher:"Öğretmen",parent:"Veli",admin:"Admin"}[USER.role];
    badge.className="role-badge role-"+USER.role;
    loadSessions();loadToolsGrid();
  }catch(e){document.getElementById("loginError").textContent="Bağlantı hatası"}
}

function logout(){
  TOKEN=null;USER=null;CURRENT_SESSION=null;
  document.getElementById("loginScreen").style.display="flex";
  document.getElementById("app").style.display="none";
  document.getElementById("chatView").classList.remove("visible");
  document.getElementById("welcomeScreen").style.display="flex";
}

function toggleSidebar(){
  document.getElementById("sidebar").classList.toggle("open");
  document.getElementById("sidebarOverlay").classList.toggle("show");
}

async function loadSessions(){
  const r=await fetch(API+"/api/ai/sessions",{headers:{Authorization:"Bearer "+TOKEN}});
  const d=await r.json();
  document.getElementById("sessionsList").innerHTML=(d.data?.sessions||[]).map(s=>
    `<div class="session-item${CURRENT_SESSION===s.id?' active':''}" onclick="openSession('${s.id}')">
      <div>${s.title||'Konuşma'}</div>
      <div class="agent-tag">${s.agent_key}</div>
    </div>`
  ).join("");
}

async function newSession(){
  const r=await fetch(API+"/api/ai/sessions",{method:"POST",headers:{Authorization:"Bearer "+TOKEN,"Content-Type":"application/json"},body:JSON.stringify({})});
  const d=await r.json();
  if(d.ok){await loadSessions();openSession(d.data.session_id)}
  // Close sidebar on mobile
  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("sidebarOverlay").classList.remove("show");
}

async function openSession(sid){
  CURRENT_SESSION=sid;
  document.getElementById("welcomeScreen").style.display="none";
  document.getElementById("chatView").classList.add("visible");
  document.getElementById("fabBtn").style.display="none";

  const r=await fetch(API+"/api/ai/sessions/"+sid,{headers:{Authorization:"Bearer "+TOKEN}});
  const d=await r.json();
  const el=document.getElementById("messages");
  el.innerHTML=(d.data?.messages||[]).map(m=>renderMessage(m)).join("");
  el.scrollTop=el.scrollHeight;
  loadSessions();

  // Close sidebar on mobile
  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("sidebarOverlay").classList.remove("show");
  document.getElementById("chatInput").focus();
}

function renderMessage(m){
  let c=m.content||"";
  c=c.replace(/```[\s\S]*?```/g,s=>'<pre><code>'+s.slice(3,-3).replace(/^[a-z]*\n/,'')+'</code></pre>');
  c=c.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
  // Tables
  c=c.replace(/\|(.+)\|\n\|[-| ]+\|\n((?:\|.+\|\n?)*)/g,(match,header,rows)=>{
    let t='<table style="width:100%;font-size:12px;border-collapse:collapse;margin:8px 0"><tr>';
    header.split('|').filter(Boolean).forEach(h=>t+=`<th style="padding:4px 8px;border-bottom:2px solid var(--border);text-align:left">${h.trim()}</th>`);
    t+='</tr>';
    rows.trim().split('\n').forEach(r=>{t+='<tr>';r.split('|').filter(Boolean).forEach(c=>t+=`<td style="padding:4px 8px;border-bottom:1px solid var(--border)">${c.trim()}</td>`);t+='</tr>'});
    return t+'</table>';
  });
  c=c.replace(/\n/g,'<br>');
  
  let tools="";
  const tc=m.used_tools||m.tool_calls;
  if(tc){try{const arr=typeof tc==='string'?JSON.parse(tc):tc;if(arr.length)tools=`<div class="tools-used">${arr.map(t=>`<span>🔧 ${t}</span>`).join("")}</div>`}catch{}}
  return`<div class="msg ${m.role}">${c}${tools}</div>`;
}

async function sendMessage(){
  const input=document.getElementById("chatInput");
  const msg=input.value.trim();
  if(!msg||!CURRENT_SESSION)return;
  input.value="";

  const el=document.getElementById("messages");
  el.innerHTML+=renderMessage({role:"user",content:msg});
  
  // Add assistant bubble with typing
  const assistantId="msg-"+Date.now();
  el.innerHTML+=`<div class="msg assistant" id="${assistantId}"><span class="typing-text">AI düşünüyor</span></div>`;
  el.scrollTop=el.scrollHeight;
  document.getElementById("sendBtn").disabled=true;

  let fullText="";
  let usedTools=[];

  try{
    const response=await fetch(API+"/api/ai/chat/stream",{
      method:"POST",
      headers:{Authorization:"Bearer "+TOKEN,"Content-Type":"application/json"},
      body:JSON.stringify({session_id:CURRENT_SESSION,message:msg})
    });

    if(!response.ok){
      const err=await response.json();
      document.getElementById(assistantId).innerHTML="⚠️ "+(err.error?.message||"Hata");
      document.getElementById("sendBtn").disabled=false;
      return;
    }

    const reader=response.body.getReader();
    const decoder=new TextDecoder();
    let buffer="";

    while(true){
      const{done,value}=await reader.read();
      if(done)break;
      
      buffer+=decoder.decode(value,{stream:true});
      const lines=buffer.split("\n");
      buffer=lines.pop();

      for(const line of lines){
        if(!line.startsWith("data: "))continue;
        try{
          const data=JSON.parse(line.slice(6));
          if(data.type==="tools"){
            usedTools=data.tools;
          }else if(data.type==="chunk"){
            fullText+=data.text;
            // Remove memory tags from display
            let display=fullText.replace(/\[HAFIZA_KAYDET:[^\]]+\]/g,"").trim();
            // Render markdown
            let rendered=display;
            rendered=rendered.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
            rendered=rendered.replace(/\n/g,'<br>');
            let tools="";
            if(usedTools.length)tools=`<div class="tools-used">${usedTools.map(t=>`<span>🔧 ${t}</span>`).join("")}</div>`;
            document.getElementById(assistantId).innerHTML=rendered+tools;
            el.scrollTop=el.scrollHeight;
          }else if(data.type==="done"){
            // Final render with full markdown
            let display=fullText.replace(/\[HAFIZA_KAYDET:[^\]]+\]/g,"").trim();
            document.getElementById(assistantId).innerHTML=renderMessage({role:"assistant",content:display,used_tools:usedTools}).replace(/^<div class="msg assistant">/,'').replace(/<\/div>$/,'');
            el.scrollTop=el.scrollHeight;
          }else if(data.type==="error"){
            document.getElementById(assistantId).innerHTML="⚠️ "+data.message;
          }
        }catch{}
      }
    }
  }catch(e){
    document.getElementById(assistantId).innerHTML="⚠️ Bağlantı hatası";
  }

  el.scrollTop=el.scrollHeight;
  document.getElementById("sendBtn").disabled=false;
  input.focus();
}

function loadToolsGrid(){
  const descs={
    student:[
      {icon:"📊",name:"Sınav Analizi",desc:"Sınavlarını analiz et, eksik konuları bul",q:"Son sınavlarımda durumum nasıl?"},
      {icon:"📝",name:"Ödev Takibi",desc:"Bekleyen ödevlerini gör",q:"Ödevlerim ne durumda?"},
      {icon:"🎯",name:"Çalışma Planı",desc:"Kişisel çalışma planı oluştur",q:"Bana bir çalışma planı hazırla"},
      {icon:"📖",name:"Konu Anlatımı",desc:"Zorlandığın konuyu öğren",q:"Kesirlerde sıralama konusunu anlat"}
    ],
    teacher:[
      {icon:"📊",name:"Sınıf Performansı",desc:"Sınıfının genel durumunu gör",q:"Sınıfımın performansı nasıl?"},
      {icon:"📋",name:"Öğrenci Listesi",desc:"Öğrencilerini ve notlarını gör",q:"Öğrencilerimin sınav sonuçları ne?"},
      {icon:"🔍",name:"Kazanım Analizi",desc:"Konu bazlı başarı oranları",q:"Hangi konularda sınıf zorlanıyor?"}
    ],
    parent:[
      {icon:"📊",name:"Sınav Sonuçları",desc:"Çocuğunuzun sınav durumu",q:"Çocuğumun sınav sonuçları nasıl?"},
      {icon:"📅",name:"Devamsızlık",desc:"Devamsızlık bilgileri",q:"Çocuğumun devamsızlık durumu ne?"},
      {icon:"📝",name:"Ödevler",desc:"Ödev durumu",q:"Çocuğumun ödevleri ne durumda?"}
    ]
  };
  const tools=descs[USER?.role]||[];
  document.getElementById("toolsGrid").innerHTML=tools.map(t=>
    `<div class="tool-card" onclick="startWithQuestion('${t.q}')">
      <h4>${t.icon} ${t.name}</h4>
      <p>${t.desc}</p>
    </div>`
  ).join("");
}

async function startWithQuestion(q){
  await newSession();
  document.getElementById("chatInput").value=q;
  sendMessage();
}

document.getElementById("chatInput")?.addEventListener("keydown",e=>{if(e.key==="Enter")sendMessage()});
</script>
</body>
</html>
